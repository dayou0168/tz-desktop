name: TZ Windows Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-release-x64:
    name: Windows Release x64
    runs-on: windows-2022
    timeout-minutes: 355

    env:
      BUILD_ROOT: '${{ github.workspace }}\build-root'
      TZ_VERSION: '1.0.1'

    steps:
      - name: Checkout source and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: false
          path: build-root/tdesktop
          fetch-depth: 1
          persist-credentials: false

      - name: Select Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ($LASTEXITCODE -ne 0 -or -not $vsPath) { throw 'Visual Studio 2022 C++ tools were not found.' }
          "VS_PATH=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Release dependencies
        shell: cmd
        working-directory: '${{ env.BUILD_ROOT }}'
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          set "TZ_PREPARE_THREADS=2"
          set "CL_MPCount=1"
          set "UseMultiToolTask=false"
          set "MSBUILDDISABLENODEREUSE=1"
          "%BUILD_ROOT%\tdesktop\Telegram\build\prepare\win.bat" silent

      - name: Configure TZ Release x64
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          cd /d "%BUILD_ROOT%\tdesktop\Telegram"
          call configure.bat x64 ^
            -D TDESKTOP_API_TEST=ON ^
            -D CMAKE_CONFIGURATION_TYPES=Release ^
            -D DESKTOP_APP_SPECIAL_TARGET=win64 ^
            -D DESKTOP_APP_ENABLE_LTO=ON ^
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
            -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON
          if errorlevel 1 exit /b 1

      - name: Build TZ Release x64
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          MSBuild.exe "%BUILD_ROOT%\tdesktop\out\Telegram.sln" /m:2 /t:Telegram /p:Configuration=Release /p:Platform=x64 /nr:false /p:CL_MPCount=1 /p:UseMultiToolTask=false

      - name: Build installer and archives
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $release = Join-Path $env:BUILD_ROOT 'tdesktop\out\Release'
          $artifacts = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          $runtime = Join-Path $artifacts 'runtime'
          $symbols = Join-Path $artifacts 'symbols'
          New-Item -ItemType Directory -Path (Join-Path $runtime 'modules\x64\d3d'), $symbols -Force | Out-Null

          Copy-Item -LiteralPath (Join-Path $release 'TZ.exe') -Destination (Join-Path $runtime 'TZ.exe')
          Copy-Item -LiteralPath (Join-Path $release 'modules\x64\d3d\d3dcompiler_47.dll') -Destination (Join-Path $runtime 'modules\x64\d3d\d3dcompiler_47.dll')
          Copy-Item -LiteralPath (Join-Path $release 'TZ.pdb') -Destination (Join-Path $symbols 'TZ.pdb')

          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) 'Inno Setup 6\ISCC.exe'
          }
          $iss = Join-Path $env:BUILD_ROOT 'tdesktop\Telegram\build\setup.iss'
          & $iscc "/dMyAppVersion=$env:TZ_VERSION" "/dMyAppVersionFull=$env:TZ_VERSION" "/dReleasePath=$runtime" '/dMyBuildTarget=win64' $iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $setup = Join-Path $runtime "TZ-$env:TZ_VERSION-Setup.exe"
          Move-Item -LiteralPath $setup -Destination (Join-Path $artifacts (Split-Path $setup -Leaf))
          Compress-Archive -Path (Join-Path $runtime '*') -DestinationPath (Join-Path $artifacts "TZ-$env:TZ_VERSION-windows-x64.zip") -CompressionLevel Optimal
          Compress-Archive -Path (Join-Path $symbols '*') -DestinationPath (Join-Path $artifacts "TZ-$env:TZ_VERSION-symbols.zip") -CompressionLevel Optimal

          $published = @(
            "TZ-$env:TZ_VERSION-Setup.exe",
            "TZ-$env:TZ_VERSION-windows-x64.zip",
            "TZ-$env:TZ_VERSION-symbols.zip"
          )
          $published | ForEach-Object {
            $path = Join-Path $artifacts $_
            $hash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $_"
          } | Set-Content -LiteralPath (Join-Path $artifacts 'SHA256SUMS.txt') -Encoding ascii

      - name: Upload Windows Release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: TZ-1.0.1-windows-x64
          path: |
            artifacts/TZ-1.0.1-Setup.exe
            artifacts/TZ-1.0.1-windows-x64.zip
            artifacts/TZ-1.0.1-symbols.zip
            artifacts/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
