name: TZ Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner:
        description: Windows runner label
        required: true
        default: windows-2022
        type: choice
        options:
          - windows-2022
          - tz-windows-x64

permissions:
  contents: read

jobs:
  build-windows-x64:
    name: Build Windows Release x64
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'windows-2022' }}
    timeout-minutes: 355

    env:
      BUILD_ROOT: '${{ github.workspace }}\build-root'
      TZ_VERSION: '1.0.1'

    steps:
      - name: Checkout source and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: false
          path: build-root/tdesktop
          fetch-depth: 20
          persist-credentials: false
          clean: false

      - name: Select Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ($LASTEXITCODE -ne 0 -or -not $vsPath) { throw 'Visual Studio 2022 C++ tools were not found.' }
          "VS_PATH=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $toolset = (Get-Content -LiteralPath (Join-Path $vsPath 'VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt') -Raw).Trim()
          "TZ_MSVC_TOOLSET=$toolset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Release dependencies
        id: deps-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}\Libraries
            ${{ env.BUILD_ROOT }}\ThirdParty
          key: tz-deps-windows-x64-msvc-${{ env.TZ_MSVC_TOOLSET }}-python-3.10-${{ hashFiles('build-root/tdesktop/Telegram/build/prepare/**', 'build-root/tdesktop/.gitmodules', 'build-root/tdesktop/Telegram/.gitmodules') }}

      - name: Restore legacy Release dependencies
        id: legacy-deps-cache
        if: steps.deps-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}\Libraries
            ${{ env.BUILD_ROOT }}\ThirdParty
          key: tz-deps-windows-x64-20260714.244.1-msvc-${{ env.TZ_MSVC_TOOLSET }}-python-3.10-${{ hashFiles('build-root/tdesktop/Telegram/build/prepare/**', 'build-root/tdesktop/.gitmodules', 'build-root/tdesktop/Telegram/.gitmodules') }}

      - name: Prepare Release dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true' && steps.legacy-deps-cache.outputs.cache-hit != 'true'
        shell: cmd
        working-directory: '${{ env.BUILD_ROOT }}'
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          set "TZ_PREPARE_THREADS=2"
          set "CL_MPCount=1"
          set "UseMultiToolTask=false"
          set "MSBUILDDISABLENODEREUSE=1"
          "%BUILD_ROOT%\tdesktop\Telegram\build\prepare\win.bat" silent

      - name: Save Release dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true' && success()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}\Libraries
            ${{ env.BUILD_ROOT }}\ThirdParty
          key: tz-deps-windows-x64-msvc-${{ env.TZ_MSVC_TOOLSET }}-python-3.10-${{ hashFiles('build-root/tdesktop/Telegram/build/prepare/**', 'build-root/tdesktop/.gitmodules', 'build-root/tdesktop/Telegram/.gitmodules') }}

      - name: Restore compile checkpoint
        id: compile-checkpoint
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/*.dir/Release
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/*_autogen
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/gen
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/shaders
          key: tz-compile-windows-x64-branch-${{ github.ref_name }}-msvc-${{ env.TZ_MSVC_TOOLSET }}-Release-lto-off-sha-${{ github.sha }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          restore-keys: |
            tz-compile-windows-x64-branch-${{ github.ref_name }}-msvc-${{ env.TZ_MSVC_TOOLSET }}-Release-lto-off-sha-${{ github.sha }}-
            tz-compile-windows-x64-branch-${{ github.ref_name }}-msvc-${{ env.TZ_MSVC_TOOLSET }}-Release-lto-off-

      - name: Prepare restored compile checkpoint
        shell: pwsh
        env:
          TZ_COMPILE_MATCHED_KEY: ${{ steps.compile-checkpoint.outputs.cache-matched-key }}
          TZ_CURRENT_SHA: ${{ github.sha }}
          TZ_BRANCH: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = Join-Path $env:BUILD_ROOT 'tdesktop'
          $outRoot = Join-Path $repo 'out'

          function Get-CompileCheckpointDirectories {
            if (-not (Test-Path -LiteralPath $outRoot -PathType Container)) { return @() }
            return @(Get-ChildItem -LiteralPath $outRoot -Recurse -Directory -Force -ErrorAction Stop |
              Where-Object {
                ($_.Name -eq 'Release' -and $_.Parent.Name -like '*.dir') -or
                $_.Name -like '*_autogen' -or
                $_.Name -eq 'gen' -or
                $_.Name -eq 'shaders'
              })
          }

          function Remove-CompileCheckpoint([string]$reason) {
            $directories = @(Get-CompileCheckpointDirectories |
              Sort-Object @{ Expression = { $_.FullName.Length }; Descending = $true })
            foreach ($directory in $directories) {
              if (Test-Path -LiteralPath $directory.FullName) {
                Remove-Item -LiteralPath $directory.FullName -Recurse -Force -ErrorAction Stop
              }
            }
            $remaining = @(Get-CompileCheckpointDirectories)
            if ($remaining.Count -ne 0) {
              throw "Could not remove all compile checkpoint directories ($($remaining.Count) remain)."
            }
            Write-Host "::notice::compile checkpoint mode: full rebuild fallback ($reason)."
          }

          function Get-CompileCheckpointFiles {
            $files = foreach ($directory in @(Get-CompileCheckpointDirectories)) {
              Get-ChildItem -LiteralPath $directory.FullName -Recurse -File -Force -ErrorAction Stop
            }
            return @($files | Sort-Object FullName -Unique)
          }

          function Set-CheckpointFileTimes([System.IO.FileInfo[]]$files, [datetime]$timestampUtc) {
            foreach ($file in $files) {
              $file.LastWriteTimeUtc = $timestampUtc
            }
          }

          function Test-SafeIncrementalPath([string]$path) {
            $normalized = $path.Replace('\', '/')
            if ($normalized -match '(^|/)\.gitmodules$' -or
                $normalized -match '^\.github/(workflows|actions)/' -or
                $normalized -match '(^|/)(CMakeLists\.txt|CMakePresets\.json|CMakeUserPresets\.json)$' -or
                $normalized -match '(^|/)(cmake|build|configure|scripts?)/' -or
                $normalized -match '(^|/)configure(\.bat|\.cmd|\.sh)?$' -or
                $normalized -match '\.(cmake|yml|yaml|bat|cmd|ps1|py|pl|sh|props|targets|vcxproj|sln|filters|toml|lock)$') {
              return $false
            }
            $extension = [System.IO.Path]::GetExtension($normalized).ToLowerInvariant()
            return $extension -in @(
              '.c', '.cc', '.cpp', '.cxx', '.m', '.mm', '.h', '.hh', '.hpp', '.hxx', '.inl', '.inc', '.ipp',
              '.asm', '.s', '.rc', '.rc2', '.qrc', '.ui', '.qml', '.js', '.ts', '.proto', '.tl', '.scheme',
              '.style', '.palette', '.lang', '.strings', '.emoji', '.tgs', '.png', '.jpg', '.jpeg', '.gif',
              '.bmp', '.ico', '.cur', '.svg', '.webp', '.wav', '.mp3', '.ogg', '.ttf', '.woff', '.woff2',
              '.glsl', '.hlsl', '.vert', '.frag'
            )
          }

          $matchedKey = $env:TZ_COMPILE_MATCHED_KEY
          if ([string]::IsNullOrWhiteSpace($matchedKey)) {
            Remove-CompileCheckpoint 'no cache key was restored'
            exit 0
          }

          $expectedPrefix = "tz-compile-windows-x64-branch-$env:TZ_BRANCH-msvc-$env:TZ_MSVC_TOOLSET-Release-lto-off-"
          $sourceMatch = [regex]::Match($matchedKey, '-sha-(?<sha>[0-9a-fA-F]{40})-run-\d+-attempt-\d+$')
          if (-not $matchedKey.StartsWith($expectedPrefix, [System.StringComparison]::Ordinal) -or -not $sourceMatch.Success) {
            Remove-CompileCheckpoint 'the restored cache key had an unexpected or unparseable source'
            exit 0
          }

          $previousSha = $sourceMatch.Groups['sha'].Value.ToLowerInvariant()
          $currentSha = $env:TZ_CURRENT_SHA.ToLowerInvariant()
          $checkpointFiles = @(Get-CompileCheckpointFiles)
          if ($checkpointFiles.Count -eq 0) {
            Remove-CompileCheckpoint 'the restored cache contained no checkpoint files'
            exit 0
          }

          if ($previousSha -eq $currentSha) {
            Set-CheckpointFileTimes $checkpointFiles ([datetime]::UtcNow)
            Write-Host "::notice::compile checkpoint mode: exact resume (source SHA $currentSha)."
            exit 0
          }

          & git -C $repo cat-file -e "$previousSha^{commit}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Remove-CompileCheckpoint "source SHA $previousSha is not available in the local checkout"
            exit 0
          }
          & git -C $repo merge-base --is-ancestor $previousSha $currentSha
          if ($LASTEXITCODE -ne 0) {
            Remove-CompileCheckpoint "source SHA $previousSha is not an ancestor of $currentSha"
            exit 0
          }

          $diffFile = Join-Path $env:RUNNER_TEMP "tz-compile-diff-$([guid]::NewGuid().ToString('N')).bin"
          try {
            & git -C $repo diff --no-ext-diff --no-renames --name-only -z "--output=$diffFile" $previousSha $currentSha -- .
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path -LiteralPath $diffFile -PathType Leaf)) {
              throw 'git diff did not produce a trustworthy path list'
            }
            $diffText = [System.Text.Encoding]::UTF8.GetString([System.IO.File]::ReadAllBytes($diffFile))
            $changedPaths = @($diffText -split "`0" | Where-Object { $_.Length -gt 0 } | Sort-Object -Unique)
          } catch {
            Remove-CompileCheckpoint 'git diff failed or its output could not be read safely'
            exit 0
          } finally {
            Remove-Item -LiteralPath $diffFile -Force -ErrorAction SilentlyContinue
          }

          $unsafeReason = $null
          $checkpointNeutralPaths = @()
          foreach ($path in $changedPaths) {
            foreach ($sha in @($previousSha, $currentSha)) {
              $treeEntry = @(& git -C $repo ls-tree $sha -- $path)
              if ($LASTEXITCODE -ne 0) {
                $unsafeReason = 'git ls-tree failed while checking a changed path'
                break
              }
              if ($treeEntry | Where-Object { $_ -match '^160000\s' }) {
                $unsafeReason = 'a submodule gitlink changed'
                break
              }
            }
            if ($unsafeReason) { break }
            $normalizedPath = $path.Replace('\\', '/')
            if ($previousSha -eq 'ef07f1e9cb524b66e97cba1a8d31ec98edb09058' -and
                $normalizedPath -eq '.github/workflows/tz-windows-release.yml') {
              $checkpointNeutralPaths += $path
              continue
            }
            if (-not (Test-SafeIncrementalPath $path)) {
              $unsafeReason = 'a changed path is outside the source, header, and resource allowlist'
              break
            }
          }
          if ($unsafeReason) {
            Remove-CompileCheckpoint $unsafeReason
            exit 0
          }

          $generatedDirectories = @(Get-CompileCheckpointDirectories | Where-Object {
            $_.Name -like '*_autogen' -or $_.Name -eq 'gen' -or $_.Name -eq 'shaders'
          } | Sort-Object @{ Expression = { $_.FullName.Length }; Descending = $true })
          foreach ($directory in $generatedDirectories) {
            if (Test-Path -LiteralPath $directory.FullName) {
              Remove-Item -LiteralPath $directory.FullName -Recurse -Force -ErrorAction Stop
            }
          }

          $checkpointFiles = @(Get-CompileCheckpointFiles)
          if ($checkpointFiles.Count -eq 0) {
            Remove-CompileCheckpoint 'no object checkpoint remained after generated directories were discarded'
            exit 0
          }
          $checkpointTimeUtc = [datetime]::UtcNow
          Set-CheckpointFileTimes $checkpointFiles $checkpointTimeUtc
          $changedTimeUtc = $checkpointTimeUtc.AddSeconds(2)
          $touched = 0
          foreach ($path in $changedPaths) {
            if ($checkpointNeutralPaths -contains $path) { continue }
            $fullPath = Join-Path $repo $path
            if (Test-Path -LiteralPath $fullPath -PathType Leaf) {
              (Get-Item -LiteralPath $fullPath -Force).LastWriteTimeUtc = $changedTimeUtc
              $touched++
            }
          }
          Write-Host "::notice::compile checkpoint mode: cross-commit incremental ($previousSha -> $currentSha; $($changedPaths.Count) changed paths, $touched existing files touched)."

      - name: Configure TZ Release x64
        id: configure
        shell: cmd
        run: |
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          cd /d "%BUILD_ROOT%\tdesktop\Telegram"
          call configure.bat x64 ^
            -D TDESKTOP_API_TEST=ON ^
            -D CMAKE_CONFIGURATION_TYPES=Release ^
            -D DESKTOP_APP_SPECIAL_TARGET=win64 ^
            -D DESKTOP_APP_ENABLE_LTO=OFF ^
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
            -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON
          if errorlevel 1 exit /b 1

      - name: Build TZ Release x64
        id: build
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $outRoot = Join-Path $env:BUILD_ROOT 'tdesktop\out'
          $estimated = (Get-ChildItem -LiteralPath $outRoot -Recurse -Filter '*.vcxproj' -File |
            Select-String -SimpleMatch '<ClCompile Include=' |
            Measure-Object).Count
          $existing = @(Get-ChildItem -LiteralPath $outRoot -Recurse -Filter '*.obj' -File -ErrorAction SilentlyContinue).Count
          $initialPercent = if ($estimated -gt 0) { [Math]::Min(100, [Math]::Round(($existing * 100.0) / $estimated, 1)) } else { 'n/a' }
          Write-Host "::notice::approximate compile progress: $existing / $estimated .obj (~$initialPercent%)."

          $disabledProjectCount = 0
          $disabledNodeCount = 0
          foreach ($project in @(Get-ChildItem -LiteralPath $outRoot -Recurse -Filter '*.vcxproj' -File)) {
            [xml]$projectXml = Get-Content -LiteralPath $project.FullName -Raw
            $nodes = @($projectXml.SelectNodes("//*[local-name()='MultiProcessorCompilation']") |
              Where-Object { $_.InnerText -eq 'true' })
            if ($nodes.Count -eq 0) { continue }
            foreach ($node in $nodes) {
              $node.InnerText = 'false'
            }
            $projectXml.Save($project.FullName)
            $disabledProjectCount++
            $disabledNodeCount += $nodes.Count
          }
          if ($disabledNodeCount -eq 0) {
            throw 'No generated project-level MultiProcessorCompilation setting was found to disable.'
          }
          Write-Host "::notice::disabled project-level /MP in $disabledNodeCount configuration entries across $disabledProjectCount generated projects."

          $buildScript = Join-Path $env:RUNNER_TEMP 'tz-build-release.cmd'
          @'
          @echo off
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1
          MSBuild.exe "%BUILD_ROOT%\tdesktop\out\Telegram.sln" /m:1 /t:Telegram /p:Configuration=Release /p:Platform=x64 /nr:false /p:BuildInParallel=false /p:CL_MPCount=1 /p:UseMultiToolTask=false
          exit /b %errorlevel%
          '@ | Set-Content -LiteralPath $buildScript -Encoding ascii

          $monitorScript = Join-Path $env:RUNNER_TEMP 'tz-approximate-progress.ps1'
          @'
          function Write-SystemResources {
            try {
              $os = Get-CimInstance -ClassName Win32_OperatingSystem -ErrorAction Stop
              $memory = Get-CimInstance -ClassName Win32_PerfFormattedData_PerfOS_Memory -ErrorAction Stop
              $freePhysicalGiB = [Math]::Round(([double]$os.FreePhysicalMemory * 1KB) / 1GB, 2)
              $totalPhysicalGiB = [Math]::Round(([double]$os.TotalVisibleMemorySize * 1KB) / 1GB, 2)
              $committedGiB = [Math]::Round(([double]$memory.CommittedBytes) / 1GB, 2)
              $commitLimitGiB = [Math]::Round(([double]$memory.CommitLimit) / 1GB, 2)
              $buildPrivateGiB = [Math]::Round(((@(Get-Process -Name MSBuild, cl, link, mspdbsrv -ErrorAction SilentlyContinue) |
                Measure-Object -Property PrivateMemorySize64 -Sum).Sum) / 1GB, 2)
              Write-Host "::notice::runner resources: physical free $freePhysicalGiB / $totalPhysicalGiB GiB; committed $committedGiB / $commitLimitGiB GiB; build-process private $buildPrivateGiB GiB."
            } catch {
              Write-Warning "Runner resource snapshot unavailable: $($_.Exception.Message)"
            }
          }

          $releaseDirectories = @(Get-ChildItem -LiteralPath $env:TZ_PROGRESS_ROOT -Recurse -Directory -Force -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq 'Release' -and $_.Parent.Name -like '*.dir' } |
            Select-Object -ExpandProperty FullName)
          Write-SystemResources
          while ($true) {
            Start-Sleep -Seconds 600
            if (-not (Get-Process -Id ([int]$env:TZ_PROGRESS_BUILD_PID) -ErrorAction SilentlyContinue)) { break }
            try {
              $done = 0
              foreach ($directory in $releaseDirectories) {
                $done += @(Get-ChildItem -LiteralPath $directory -Recurse -Filter '*.obj' -File -ErrorAction SilentlyContinue).Count
              }
              $total = [int]$env:TZ_PROGRESS_TOTAL
              $percent = if ($total -gt 0) { [Math]::Min(100, [Math]::Round(($done * 100.0) / $total, 1)) } else { 'n/a' }
              Write-Host "::notice::approximate compile progress: $done / $total .obj (~$percent%)."
              Write-SystemResources
            } catch {
              Write-Warning "Approximate progress monitor unavailable: $($_.Exception.Message)"
            }
          }
          '@ | Set-Content -LiteralPath $monitorScript -Encoding utf8

          $build = Start-Process -FilePath $env:ComSpec -ArgumentList @('/d', '/c', $buildScript) -NoNewWindow -PassThru
          $buildExitCode = $null
          $env:TZ_PROGRESS_ROOT = $outRoot
          $env:TZ_PROGRESS_TOTAL = [string]$estimated
          $env:TZ_PROGRESS_BUILD_PID = [string]$build.Id
          $monitor = $null
          try {
            try {
              $monitor = Start-Process -FilePath (Get-Command pwsh).Source -ArgumentList @('-NoProfile', '-File', $monitorScript) -NoNewWindow -PassThru
            } catch {
              Write-Warning "Approximate progress monitor could not start: $($_.Exception.Message)"
            }
            while (-not $build.HasExited) {
              Start-Sleep -Seconds 30
              $build.Refresh()
            }
            $build.WaitForExit()
            $buildExitCode = [int]$build.ExitCode
          } finally {
            if ($monitor -and -not $monitor.HasExited) {
              Stop-Process -Id $monitor.Id -Force -ErrorAction SilentlyContinue
            }
            Remove-Item -LiteralPath $buildScript, $monitorScript -Force -ErrorAction SilentlyContinue
          }

          if ($null -eq $buildExitCode) { throw 'MSBuild did not report an exit code.' }
          "exit_code=$buildExitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($buildExitCode -ne 0) {
            Write-Host "::error::MSBuild failed with exit code $buildExitCode."
            exit $buildExitCode
          }

      - name: Save compile checkpoint
        if: ${{ always() && steps.configure.outcome == 'success' }}
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/*.dir/Release
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/*_autogen
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/gen
            ${{ env.BUILD_ROOT }}/tdesktop/out/**/shaders
          key: tz-compile-windows-x64-branch-${{ github.ref_name }}-msvc-${{ env.TZ_MSVC_TOOLSET }}-Release-lto-off-sha-${{ github.sha }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      - name: Enforce build result
        if: ${{ always() && steps.configure.outcome == 'success' }}
        shell: pwsh
        env:
          TZ_BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          if ($env:TZ_BUILD_EXIT_CODE -notmatch '^\d+$') {
            throw 'The build step did not record a valid MSBuild exit code.'
          }
          $exitCode = [int]$env:TZ_BUILD_EXIT_CODE
          if ($exitCode -ne 0) { throw "MSBuild failed with exit code $exitCode." }

      - name: Stage reusable Windows build outputs
        if: ${{ steps.build.outputs.exit_code == '0' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $release = Join-Path $env:BUILD_ROOT 'tdesktop\out\Release'
          $intermediate = Join-Path $env:GITHUB_WORKSPACE 'artifacts\intermediate'
          $runtime = Join-Path $intermediate 'runtime'
          $symbols = Join-Path $intermediate 'symbols'
          New-Item -ItemType Directory -Path (Join-Path $runtime 'modules\x64\d3d'), $symbols -Force | Out-Null
          $outputs = @(
            @{ Source = (Join-Path $release 'TZ.exe'); Destination = (Join-Path $runtime 'TZ.exe') },
            @{ Source = (Join-Path $release 'modules\x64\d3d\d3dcompiler_47.dll'); Destination = (Join-Path $runtime 'modules\x64\d3d\d3dcompiler_47.dll') },
            @{ Source = (Join-Path $release 'TZ.pdb'); Destination = (Join-Path $symbols 'TZ.pdb') }
          )
          foreach ($output in $outputs) {
            if (-not (Test-Path -LiteralPath $output.Source -PathType Leaf) -or (Get-Item -LiteralPath $output.Source).Length -le 0) {
              throw "Required build output is missing or empty: $($output.Source)"
            }
            Copy-Item -LiteralPath $output.Source -Destination $output.Destination
            if (-not (Test-Path -LiteralPath $output.Destination -PathType Leaf) -or (Get-Item -LiteralPath $output.Destination).Length -le 0) {
              throw "Staged build output is missing or empty: $($output.Destination)"
            }
          }

      - name: Upload reusable Windows build outputs
        if: ${{ steps.build.outputs.exit_code == '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: TZ-1.0.1-windows-x64-build
          path: artifacts/intermediate
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: 14

  package-windows-x64:
    name: Package Windows Release x64
    needs: build-windows-x64
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'windows-2022' }}
    timeout-minutes: 60

    env:
      TZ_VERSION: '1.0.1'

    steps:
      - name: Checkout installer sources
        uses: actions/checkout@v6
        with:
          lfs: false
          path: packaging-source
          fetch-depth: 1
          persist-credentials: false
          clean: false
          sparse-checkout: |
            Telegram/build/setup.iss
            Telegram/Resources/art/icon256.ico
          sparse-checkout-cone-mode: false

      - name: Download reusable Windows build outputs
        uses: actions/download-artifact@v4
        with:
          name: TZ-1.0.1-windows-x64-build
          path: artifacts/intermediate

      - name: Build installer and archives
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $intermediate = Join-Path $env:GITHUB_WORKSPACE 'artifacts\intermediate'
          $runtime = Join-Path $intermediate 'runtime'
          $symbols = Join-Path $intermediate 'symbols'
          $artifacts = Join-Path $env:GITHUB_WORKSPACE 'artifacts\release'
          $sevenZip = 'C:\Program Files\7-Zip\7z.exe'
          if (-not (Test-Path -LiteralPath $sevenZip -PathType Leaf)) { throw "7-Zip was not found at $sevenZip" }
          foreach ($path in @($runtime, $symbols)) {
            if (-not (Test-Path -LiteralPath $path -PathType Container)) { throw "Required archive input directory was not found: $path" }
          }
          foreach ($path in @((Join-Path $runtime 'TZ.exe'), (Join-Path $runtime 'modules\x64\d3d\d3dcompiler_47.dll'), (Join-Path $symbols 'TZ.pdb'))) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item -LiteralPath $path).Length -le 0) {
              throw "Required archive input file is missing or empty: $path"
            }
          }
          New-Item -ItemType Directory -Path $artifacts -Force | Out-Null

          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path -LiteralPath $iscc -PathType Leaf)) { throw "Inno Setup compiler was not found: $iscc" }
          $iss = Join-Path $env:GITHUB_WORKSPACE 'packaging-source\Telegram\build\setup.iss'
          if (-not (Test-Path -LiteralPath $iss -PathType Leaf)) { throw "Inno Setup script was not found: $iss" }
          & $iscc "/dMyAppVersion=$env:TZ_VERSION" "/dMyAppVersionFull=$env:TZ_VERSION" "/dReleasePath=$runtime" '/dMyBuildTarget=win64' $iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $setupOutput = Join-Path $runtime "TZ-$env:TZ_VERSION-Setup.exe"
          $setup = Join-Path $artifacts "TZ-$env:TZ_VERSION-Setup.exe"
          if (-not (Test-Path -LiteralPath $setupOutput -PathType Leaf) -or (Get-Item -LiteralPath $setupOutput).Length -le 0) {
            throw "Installer is missing or empty: $setupOutput"
          }
          Move-Item -LiteralPath $setupOutput -Destination $setup

          $runtimeZip = Join-Path $artifacts "TZ-$env:TZ_VERSION-windows-x64.zip"
          Push-Location $runtime
          try {
            & $sevenZip a '-tzip' '-mx=9' '-mmt=on' $runtimeZip '*'
            if ($LASTEXITCODE -ne 0) { throw "7-Zip failed to create the runtime ZIP with exit code $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

          $symbolsZip = Join-Path $artifacts "TZ-$env:TZ_VERSION-symbols.zip"
          Push-Location $symbols
          try {
            & $sevenZip a '-tzip' '-mx=9' '-mmt=on' $symbolsZip '*'
            if ($LASTEXITCODE -ne 0) { throw "7-Zip failed to create the symbols ZIP with exit code $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

          foreach ($path in @($setup, $runtimeZip, $symbolsZip)) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item -LiteralPath $path).Length -le 0) {
              throw "Published artifact is missing or empty: $path"
            }
          }
          foreach ($path in @($runtimeZip, $symbolsZip)) {
            & $sevenZip t $path
            if ($LASTEXITCODE -ne 0) { throw "7-Zip test failed for $(Split-Path $path -Leaf) with exit code $LASTEXITCODE" }
          }

          $published = @(
            "TZ-$env:TZ_VERSION-Setup.exe",
            "TZ-$env:TZ_VERSION-windows-x64.zip",
            "TZ-$env:TZ_VERSION-symbols.zip"
          )
          $published | ForEach-Object {
            $path = Join-Path $artifacts $_
            $hash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $_"
          } | Set-Content -LiteralPath (Join-Path $artifacts 'SHA256SUMS.txt') -Encoding ascii
          $sumLines = @(Get-Content -LiteralPath (Join-Path $artifacts 'SHA256SUMS.txt'))
          if ($sumLines.Count -ne $published.Count) { throw "SHA256SUMS.txt contains $($sumLines.Count) lines; expected $($published.Count)" }
          foreach ($name in $published) {
            if (-not ($sumLines | Where-Object { $_ -match "^[0-9a-f]{64}  $([regex]::Escape($name))$" })) {
              throw "SHA256SUMS.txt is missing a valid entry for $name"
            }
          }

      - name: Upload Windows Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TZ-1.0.1-windows-x64
          path: |
            artifacts/release/TZ-1.0.1-Setup.exe
            artifacts/release/TZ-1.0.1-windows-x64.zip
            artifacts/release/TZ-1.0.1-symbols.zip
            artifacts/release/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
